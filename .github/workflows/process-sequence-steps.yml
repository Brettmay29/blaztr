name: Process Sequence Steps

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger processSequenceSteps
        run: |
          curl -X POST "https://blaztr.base44.app/api/functions/processSequenceSteps" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.BLAZTR_API_KEY }}" \
            -d '{}'

      - name: Trigger checkReplies
        run: |
          curl -X POST "https://blaztr.base44.app/api/functions/checkReplies" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.BLAZTR_API_KEY }}" \
            -d '{}'

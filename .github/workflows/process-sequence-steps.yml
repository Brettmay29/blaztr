name: Process Sequence Steps

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  process-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger processSequenceSteps
        run: |
          curl -X POST "https://blaztr.base44.app/api/functions/processSequenceSteps" \
            -H "Content-Type: application/json" \
            -H "api_key: ${{ secrets.BLAZTR_API_KEY }}" \
            -d '{}'
